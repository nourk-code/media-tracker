name: Publish Docs to Confluence

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  publish:
    if: |
      github.event.pull_request.merged == true &&
      github.actor != 'github-actions[bot]' &&
      github.actor != 'dependabot[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write Confluence config
        run: |
          cat > .markdown-confluence.json << 'EOF'
          {
            "confluenceBaseUrl": "https://nourfk15.atlassian.net/wiki",
            "atlassianUserName": "${{ secrets.ATLASSIAN_USERNAME }}",
            "atlassianApiToken": "${{ secrets.ATLASSIAN_API_TOKEN }}",
            "confluenceParentId": "655361",
            "spaceKey": "~7120208f6e1034850f4e18b02531512b60dc5b",
            "contentRoot": "docs"
          }
          EOF

      - name: Publish docs to Confluence
        uses: markdown-confluence/publish-action@v5
        with:
          configFile: .markdown-confluence.json
